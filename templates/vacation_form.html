{% extends "base.html" %}
{% block page_title %}{{ '휴가 수정' if row else '휴가 등록' }}{% endblock %}
{% block content %}
<div class="form-container">
  <div class="form-title">{{ '휴가 수정' if row else '휴가 등록' }}</div>
  <form method="POST">
    <div class="grid-2">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" name="date" value="{{ row.date if row else today }}" required>
      </div>
      <div class="form-group">
        <label>성명</label>
        <input type="text" name="staff_name" value="{{ row.staff_name if row else '' }}" placeholder="홍길동" required>
      </div>
      <div class="form-group">
        <label>휴가 코드</label>
        <input type="text" name="vacation_code" value="{{ row.vacation_code if row else '' }}" placeholder="코드 입력" required>
      </div>
    </div>
    <div class="flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">{{ '수정 완료' if row else '등록' }}</button>
      <a href="{{ url_for('write') }}" class="btn btn-secondary">취소</a>
    </div>
  </form>
</div>
{% endblock %}
