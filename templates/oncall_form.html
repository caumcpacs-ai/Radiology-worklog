{% extends "base.html" %}
{% block page_title %}{{ 'On-call 수정' if row else 'On-call 등록' }}{% endblock %}
{% block content %}
<div class="form-container">
  <div class="form-title">{{ 'On-call 수정' if row else 'On-call 등록' }}</div>
  <form method="POST">
    <div class="grid-2">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" name="date" value="{{ row.date if row else today }}" required>
      </div>
      <div class="form-group">
        <label>파트</label>
        <select name="part" required>
          {% for v in ['GR','CT','MR','인터벤션','간호'] %}
          <option value="{{ v }}" {{ 'selected' if row and row.part==v }}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>성명</label>
        <input type="text" name="staff_name" value="{{ row.staff_name if row else '' }}" placeholder="홍길동" required>
      </div>
      <div class="form-group">
        <label>전화받은 시각</label>
        <input type="time" name="received_time" value="{{ row.received_time if row else '' }}">
      </div>
    </div>
    <div class="form-group">
      <label>사유</label>
      <input type="text" name="reason" value="{{ row.reason if row else '' }}" placeholder="사유">
    </div>
    <div class="flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">{{ '수정 완료' if row else '등록' }}</button>
      <a href="{{ url_for('write') }}" class="btn btn-secondary">취소</a>
    </div>
  </form>
</div>
{% endblock %}
