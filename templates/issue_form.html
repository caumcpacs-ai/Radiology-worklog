{% extends 'base.html' %}
{% block page_title %}{{ '✏️ 이슈 수정' if row else '➕ 이슈 등록' }}{% endblock %}
{% block content %}
<div class="form-container">
  <div class="form-title">{{ '이슈 수정' if row else '특이사항·이슈 등록' }}</div>
  <form method="POST">
    <div class="grid-2">
      <div class="form-group">
        <label>날짜</label>
        <input type="date" name="date" value="{{ row.date if row else today }}" required>
      </div>
      <div class="form-group">
        <label>구분</label>
        <select name="category" required>
          {% for v in ['장비','환자','행정','안전','감염','기타'] %}
          <option value="{{ v }}" {{ 'selected' if row and row.category==v }}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>심각도</label>
        <select name="severity" required>
          {% for v in ['긴급','중요','일반'] %}
          <option value="{{ v }}" {{ 'selected' if row and row.severity==v }}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>
      <div class="form-group">
        <label>처리 상태</label>
        <select name="status" required>
          {% for v in ['진행중','해결','보류'] %}
          <option value="{{ v }}" {{ 'selected' if row and row.status==v }}>{{ v }}</option>
          {% endfor %}
        </select>
      </div>
    </div>
    <div class="form-group">
      <label>제목</label>
      <input type="text" name="title" value="{{ row.title if row else '' }}" placeholder="이슈 제목을 입력하세요" required>
    </div>
    <div class="form-group">
      <label>내용</label>
      <textarea name="content" rows="5" placeholder="상세 내용을 입력하세요" required>{{ row.content if row else '' }}</textarea>
    </div>
    <div class="flex gap-1 mt-2">
      <button type="submit" class="btn btn-primary">{{ '수정 완료' if row else '등록' }}</button>
      <a href="{{ url_for('issues') }}" class="btn btn-secondary">취소</a>
    </div>
  </form>
</div>
{% endblock %}
