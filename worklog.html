<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>영상의학과 업무일지</title>
<style>
/* ── 공통 (base.html 동일) ── */
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:'맑은 고딕','Malgun Gothic',sans-serif;background:#f0f2f5;color:#333;font-size:14px}
a{text-decoration:none;color:inherit}
table{width:100%;border-collapse:collapse}
th,td{padding:8px 12px;border-bottom:1px solid #e0e0e0;text-align:left;vertical-align:middle}
th{background:#f8f9fa;font-weight:600;color:#555}
tr:hover{background:#fafbfc}
input,select,textarea{width:100%;padding:7px 10px;border:1px solid #ccc;border-radius:4px;font-size:14px;font-family:inherit}
textarea{resize:vertical;min-height:80px}
button,.btn{padding:7px 16px;border:none;border-radius:4px;cursor:pointer;font-size:13px;font-family:inherit;font-weight:500}
.btn-primary{background:#1a73e8;color:#fff}.btn-primary:hover{background:#1558b0}
.btn-success{background:#34a853;color:#fff}
.btn-danger{background:#ea4335;color:#fff}
.btn-warning{background:#fbbc04;color:#333}
.btn-secondary{background:#6c757d;color:#fff}
.btn-sm{padding:4px 10px;font-size:12px}
label{display:block;margin-bottom:4px;font-weight:500;color:#555}
.form-group{margin-bottom:14px}
.card{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:20px;margin-bottom:16px}
.card-title{font-size:15px;font-weight:700;margin-bottom:14px;color:#1a73e8;border-bottom:2px solid #1a73e8;padding-bottom:6px}
.badge{display:inline-block;padding:2px 8px;border-radius:12px;font-size:11px;font-weight:600}
.badge-danger{background:#fdecea;color:#c62828}
.badge-warning{background:#fff8e1;color:#f57f17}
.badge-success{background:#e8f5e9;color:#2e7d32}
.badge-info{background:#e3f2fd;color:#1565c0}
.badge-secondary{background:#f5f5f5;color:#555}
.alert{padding:10px 16px;border-radius:4px;margin-bottom:12px;font-size:13px}
.alert-success{background:#e8f5e9;color:#2e7d32;border:1px solid #c8e6c9}
.alert-danger{background:#fdecea;color:#c62828;border:1px solid #ffcdd2}
.alert-info{background:#e3f2fd;color:#1565c0;border:1px solid #bbdefb}
.text-muted{color:#888;font-size:12px}
.text-right{text-align:right}
.mt-2{margin-top:8px}.mb-2{margin-bottom:8px}
.flex{display:flex}.flex-wrap{flex-wrap:wrap}.align-center{align-items:center}.justify-between{justify-content:space-between}
.grid-2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
/* ── 사이드바 ── */
.sidebar{position:fixed;left:0;top:0;bottom:0;width:200px;background:#1e2a3a;color:#fff;padding:0;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-header{padding:18px 16px;background:#152232;font-size:13px;font-weight:700;border-bottom:1px solid #2a3f55}
.sidebar-header .dept{color:#8ab4f8;font-size:11px;margin-top:2px}
.sidebar nav a{display:block;padding:10px 16px;color:#b0bec5;font-size:13px;border-left:3px solid transparent;transition:.2s}
.sidebar nav a:hover,.sidebar nav a.active{background:#2a3f55;color:#fff;border-left-color:#1a73e8}
.sidebar nav .nav-section{padding:8px 16px 4px;font-size:10px;color:#546e7a;text-transform:uppercase;letter-spacing:.8px;margin-top:4px}
.sidebar-footer{padding:12px 16px;border-top:1px solid #2a3f55;font-size:12px;color:#78909c}
/* ── 메인 ── */
.main{margin-left:200px;min-height:100vh}
.topbar{background:#fff;padding:12px 24px;border-bottom:1px solid #e0e0e0;display:flex;justify-content:space-between;align-items:center;position:sticky;top:0;z-index:50}
.topbar .page-title{font-size:16px;font-weight:700;color:#1e2a3a}
.content{padding:20px 24px 60px}
/* ── KPI 카드 ── */
.stat-grid{display:grid;grid-template-columns:repeat(6,1fr);gap:14px;margin-bottom:20px}
.stat-card{background:#fff;border-radius:8px;padding:16px 20px;box-shadow:0 1px 4px rgba(0,0,0,.1);border-left:4px solid #1a73e8;display:flex;flex-direction:column;position:relative;overflow:visible}
.stat-card .num{font-size:28px;font-weight:700;color:#1a73e8}
.stat-card .lbl{font-size:12px;color:#888;margin-top:2px;cursor:default}
.stat-card.red{border-left-color:#ea4335}.stat-card.red .num{color:#ea4335}
.stat-card.green{border-left-color:#34a853}.stat-card.green .num{color:#34a853}
.stat-card.yellow{border-left-color:#fbbc04}.stat-card.yellow .num{color:#f57f17}
.stat-card.purple{border-left-color:#9c27b0}.stat-card.purple .num{color:#9c27b0}
.stat-card.teal{border-left-color:#009688}.stat-card.teal .num{color:#009688}
/* KPI 툴팁 */
.kpi-tooltip{display:none;position:absolute;top:calc(100% + 8px);left:50%;transform:translateX(-50%);background:#fff;border:1px solid #ddd;border-radius:8px;box-shadow:0 6px 20px rgba(0,0,0,.15);padding:12px 14px;z-index:200;min-width:260px;max-width:400px;font-size:12px;text-align:left;pointer-events:none;white-space:normal}
.kpi-tooltip::before{content:'';position:absolute;top:-6px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#ddd;border-top:none}
.kpi-tooltip::after{content:'';position:absolute;top:-5px;left:50%;transform:translateX(-50%);border:6px solid transparent;border-bottom-color:#fff;border-top:none}
.stat-card:hover .kpi-tooltip{display:block}
.kpi-tooltip .tt-title{font-weight:700;color:#1e2a3a;margin-bottom:8px;font-size:12px;border-bottom:1px solid #eee;padding-bottom:5px}
.kpi-tooltip table{width:100%;border-collapse:collapse}
.kpi-tooltip td{padding:3px 5px;vertical-align:top;border-bottom:1px solid #f5f5f5}
.kpi-tooltip tr:last-child td{border-bottom:none}
.kpi-tooltip .empty-msg{color:#aaa;font-style:italic}
/* ── 대시보드 ── */
.shift-badge{display:inline-block;padding:1px 7px;border-radius:10px;font-size:11px;font-weight:600}
.shift-오전{background:#e3f2fd;color:#1565c0}
.shift-종일{background:#e8f5e9;color:#2e7d32}
.shift-야간{background:#fce4ec;color:#c62828}
.dash-2col{display:grid;grid-template-columns:1fr 1fr;gap:16px;margin-bottom:16px}
/* ── 테이블 래퍼 ── */
.table-wrap{overflow-x:auto;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.table-wrap table{margin:0}
.table-header{display:flex;justify-content:space-between;align-items:center;padding:14px 16px;border-bottom:1px solid #e0e0e0}
.table-header h2{font-size:15px;font-weight:700}
/* ── 업무일지 리스트 ── */
.log-table th,.log-table td{text-align:center}
.log-table td:first-child{text-align:left;font-weight:600}
.log-table td:last-child{text-align:center;white-space:nowrap}
.dot{display:inline-block;width:22px;height:22px;border-radius:50%;font-size:11px;line-height:22px;font-weight:700}
.dot.filled{background:#1a73e8;color:#fff}
.dot.empty{background:#eee;color:#aaa}
.badge-submitted{background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600}
.badge-rejected{background:#fdecea;color:#c62828;border:1px solid #ffcdd2;font-size:11px;padding:2px 7px;border-radius:10px;font-weight:600}
/* ── 작성 페이지 ── */
.date-bar{display:flex;align-items:center;gap:12px;margin-bottom:20px;background:#fff;padding:14px 18px;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1)}
.date-bar input[type=date]{width:180px;font-size:15px;font-weight:600;border:2px solid #1a73e8;border-radius:6px;padding:6px 10px;color:#1e2a3a}
.acc{background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);margin-bottom:10px;overflow:hidden}
.acc-head{display:flex;align-items:center;justify-content:space-between;padding:12px 18px;cursor:pointer;user-select:none;border-left:4px solid #1a73e8;font-weight:700;font-size:14px;background:#fff}
.acc-head:hover{background:#f5f8ff}
.acc-head .cnt{font-size:12px;color:#888;font-weight:400;margin-left:6px}
.acc-head .toggle{font-size:18px;color:#aaa;transition:.2s}
.acc-body{display:block;padding:0 18px 16px;border-top:1px solid #f0f0f0}
.add-form{background:#f8f9fb;border-radius:6px;padding:14px;margin-top:10px;border:1px dashed #ccc}
.add-form .form-row{display:grid;gap:8px;margin-bottom:8px}
.add-form .form-row.col2{grid-template-columns:1fr 1fr}
.add-form .form-row.col3{grid-template-columns:1fr 1fr 1fr}
.add-form .form-row.col4{grid-template-columns:1fr 1fr 1fr 1fr}
.add-form label{font-size:12px;margin-bottom:2px;color:#555}
.edit-form{background:#fffde7;border-radius:6px;padding:14px;margin-bottom:4px;border:1px solid #f9a825;display:none}
.edit-form .form-row{display:grid;gap:8px;margin-bottom:8px}
.edit-form .form-row.col2{grid-template-columns:1fr 1fr}
.edit-form .form-row.col3{grid-template-columns:1fr 1fr 1fr}
.edit-form .form-row.col4{grid-template-columns:1fr 1fr 1fr 1fr}
.edit-form label{font-size:12px;margin-bottom:2px;color:#555}
.entry-list{margin-top:10px}
.entry-row{display:flex;align-items:center;justify-content:space-between;padding:7px 10px;border-radius:4px;background:#fafafa;border:1px solid #eee;margin-bottom:4px;font-size:13px;gap:8px}
.entry-row .info{flex:1;min-width:0}
.entry-row .btns{display:flex;gap:4px;flex-shrink:0}
.acc-head.roster-h{border-left-color:#5c6bc0}
.acc-head.vacation-h{border-left-color:#26a69a}
.acc-head.oncall-h{border-left-color:#1a73e8}
.acc-head.overtime-h{border-left-color:#f57c00}
.acc-head.equip-h{border-left-color:#e53935}
.acc-head.handover-h{border-left-color:#43a047}
.acc-head.issue-h{border-left-color:#8e24aa}
/* ── 반려 모달 ── */
#rejectModal{display:none;position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.5);z-index:9999;justify-content:center;align-items:center}
.modal-box{background:#fff;border-radius:10px;padding:28px;min-width:340px;max-width:420px;box-shadow:0 8px 32px rgba(0,0,0,.2)}
.modal-box h3{margin-bottom:8px;font-size:16px;color:#1e2a3a}
.modal-box .modal-date{color:#555;font-size:13px;margin-bottom:18px}
.modal-box label{font-size:13px;font-weight:600;display:block;margin-bottom:6px}
.modal-box select{width:100%;padding:9px 10px;border:1px solid #ddd;border-radius:6px;font-size:14px}
.modal-actions{display:flex;gap:8px;justify-content:flex-end;margin-top:20px}
/* ── 인쇄 ── */
.print-wrap{max-width:900px;margin:0 auto;padding:20px}
.print-header-tbl{width:100%;border-collapse:collapse;border-bottom:2px solid #000;margin-bottom:16px}
.print-header-tbl td{border:none;padding:0 0 12px 0;vertical-align:middle}
.print-header-title h1{font-size:22px;font-weight:700;letter-spacing:1px}
.print-header-title .sub{font-size:12px;color:#444;margin-top:6px}
.approval-box{border-collapse:collapse;font-size:11px;float:right;width:192px;table-layout:fixed}
.approval-box th,.approval-box td{border:1px solid #000;text-align:center;padding:0;width:64px}
.approval-box th{font-weight:600;height:24px;padding:2px 4px;background:#fff}
.approval-box td{height:50px}
.psection{margin-bottom:16px}
.psection-title{font-size:13px;font-weight:700;background:#1e2a3a;color:#fff;padding:5px 10px;border-radius:3px;margin-bottom:6px}
.psection table{width:100%;border-collapse:collapse;font-size:11px}
.psection th,.psection td{border:1px solid #ccc;padding:5px 8px;text-align:left;vertical-align:middle}
.psection th{background:#f0f0f0;font-weight:600;white-space:nowrap}
.empty-msg{color:#aaa;font-style:italic;padding:6px 0;font-size:11px}
.print-footer{margin-top:20px;border-top:1px solid #ccc;padding-top:8px;font-size:11px;color:#666;display:flex;justify-content:space-between}
@media print{
  .sidebar,.topbar,.no-print{display:none!important}
  .main{margin-left:0}
  @page{margin:15mm;size:A4}
}
/* ── 로그인 ── */
#login-page{display:none;align-items:center;justify-content:center;min-height:100vh;background:#1e2a3a}
.login-box{background:#fff;border-radius:12px;padding:40px;width:360px;box-shadow:0 8px 32px rgba(0,0,0,.3)}
.login-box .logo{text-align:center;margin-bottom:28px}
.login-box .logo .icon{font-size:40px;display:block;margin-bottom:8px}
.login-box .logo h1{font-size:18px;font-weight:700;color:#1e2a3a}
.login-box .logo p{font-size:12px;color:#888;margin-top:4px}
.login-box input{width:100%;padding:10px 12px;border:1px solid #ddd;border-radius:6px;font-size:14px;font-family:inherit;margin-bottom:14px}
.login-box input:focus{outline:none;border-color:#1a73e8}
.login-box button{width:100%;padding:11px;background:#1a73e8;color:#fff;border:none;border-radius:6px;font-size:15px;font-weight:600;cursor:pointer}
.login-box button:hover{background:#1558b0}
.hint{text-align:center;margin-top:14px;font-size:11px;color:#aaa}
/* ── 사용자 관리 ── */
.form-container{max-width:700px;background:#fff;border-radius:8px;box-shadow:0 1px 4px rgba(0,0,0,.1);padding:24px}
.form-title{font-size:16px;font-weight:700;margin-bottom:20px;padding-bottom:10px;border-bottom:2px solid #1a73e8;color:#1e2a3a}
</style>
</head>
<body>

<!-- ═══════════ 로그인 ═══════════ -->
<div id="login-page" style="display:flex">
  <div class="login-box">
    <div class="logo">
      <span class="icon">🏥</span>
      <h1>영상의학과 업무일지</h1>
      <p>Radiology Department Work Log</p>
    </div>
    <div id="login-alert" class="alert alert-danger" style="display:none"></div>
    <label>아이디</label>
    <input type="text" id="inp-user" placeholder="아이디 입력" autocomplete="username">
    <label>비밀번호</label>
    <input type="password" id="inp-pw" placeholder="비밀번호 입력" autocomplete="current-password">
    <button onclick="doLogin()">로그인</button>
    <p class="hint">초기 계정: admin / admin1234</p>
  </div>
</div>

<!-- ═══════════ 앱 ═══════════ -->
<div id="app-page" style="display:none">
  <div class="sidebar">
    <div class="sidebar-header">🏥 영상의학과 업무일지<div class="dept">Radiology Dept.</div></div>
    <nav style="flex:1">
      <a href="#" data-page="dashboard">📊 메인</a>
      <a href="#" data-page="write">✏️ 업무일지 작성</a>
      <a href="#" data-page="worklog">📋 업무일지 리스트</a>
      <div class="nav-section admin-only" style="display:none">관리</div>
      <a href="#" data-page="users" class="admin-only" style="display:none">👥 사용자 관리</a>
    </nav>
    <div class="sidebar-footer">
      👤 <span id="sf-name"></span> (<span id="sf-role"></span>)<br>
      <a href="#" onclick="doLogout();return false" style="color:#ef9a9a">로그아웃</a>
    </div>
  </div>

  <div class="main">
    <div class="topbar">
      <div class="page-title" id="page-title"></div>
      <div class="text-muted" id="topbar-clock"></div>
    </div>
    <div class="content" id="content"></div>
  </div>
</div>

<!-- ═══════════ 반려 모달 ═══════════ -->
<div id="rejectModal">
  <div class="modal-box">
    <h3>업무일지 반려</h3>
    <p class="modal-date" id="rejectModalDate"></p>
    <label>반려 대상 사용자 선택</label>
    <select id="rejectUserSelect"></select>
    <div class="modal-actions">
      <button class="btn btn-secondary" onclick="closeRejectModal()">취소</button>
      <button class="btn btn-warning" onclick="confirmReject()">반려 확인</button>
    </div>
  </div>
</div>

<script>
'use strict';

// ── 전역 상태 ──
let ME = null; // {user, name, role}
let _rejectDate = '';
let _writeDate = '';

// ── API 헬퍼 ──
async function api(path, body=null) {
  try {
    const opts = {credentials:'include'};
    if (body !== null) {
      opts.method = 'POST';
      opts.headers = {'Content-Type':'application/json'};
      opts.body = JSON.stringify(body);
    }
    const r = await fetch(path, opts);
    return r.json();
  } catch(e) {
    return {ok: false, msg: '서버에 연결할 수 없습니다. 서버가 실행 중인지 확인하고\nhttp://서버IP:1000/app 으로 접속하세요.\n(' + e.message + ')'};
  }
}

function esc(s) {
  return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ── 시계 ──
setInterval(() => {
  const el = document.getElementById('topbar-clock');
  if (el) el.textContent = new Date().toLocaleString('ko-KR');
}, 1000);

// ── 로그인 / 로그아웃 ──
async function doLogin() {
  const username = document.getElementById('inp-user').value.trim();
  const password = document.getElementById('inp-pw').value;
  const r = await api('/api/login', {username, password});
  if (r.ok) {
    ME = r;
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').style.display = '';
    document.getElementById('sf-name').textContent = r.name;
    document.getElementById('sf-role').textContent = r.role === 'admin' ? '관리자' : '사용자';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = r.role === 'admin' ? '' : 'none');
    nav('dashboard');
  } else {
    const el = document.getElementById('login-alert');
    el.textContent = r.msg || '로그인 실패';
    el.style.display = '';
  }
}

async function doLogout() {
  await api('/api/logout', {});
  ME = null;
  document.getElementById('app-page').style.display = 'none';
  document.getElementById('login-page').style.display = 'flex';
  document.getElementById('inp-pw').value = '';
  document.getElementById('login-alert').style.display = 'none';
}

// ── 네비게이션 ──
const pageTitles = {dashboard:'📊 대시보드', write:'✏️ 작성', worklog:'📋 업무일지 리스트', users:'👥 사용자 관리', print:'🖨️ 인쇄'};

function nav(page, params={}) {
  document.querySelectorAll('.sidebar nav a').forEach(a => a.classList.toggle('active', a.dataset.page === page));
  document.getElementById('page-title').textContent = pageTitles[page] || page;
  document.getElementById('content').innerHTML = '<p style="padding:20px;color:#888">로딩 중...</p>';
  if (page === 'dashboard') renderDashboard();
  else if (page === 'write') renderWrite(params.date);
  else if (page === 'worklog') renderWorklog();
  else if (page === 'users') renderUsers();
  else if (page === 'print') renderPrint(params.date);
}

document.querySelectorAll('[data-page]').forEach(a => {
  a.addEventListener('click', e => { e.preventDefault(); nav(a.dataset.page); });
});

// ── 공통: 아코디언 토글 ──
function toggle(head) {
  const body = head.nextElementSibling;
  const arrow = head.querySelector('.toggle');
  const isOpen = body.style.display !== 'none';
  body.style.display = isOpen ? 'none' : 'block';
  arrow.textContent = isOpen ? '▼' : '▲';
}

// ═══════════════════════════════════════════════════
// 대시보드
// ═══════════════════════════════════════════════════
async function renderDashboard() {
  const d = await api('/api/dashboard');
  if (!d.ok) return;

  function badge(text, cls) { return `<span class="badge ${cls}">${esc(text)}</span>`; }
  function sev(s) { return s==='긴급'?'badge-danger':s==='중요'?'badge-warning':'badge-secondary'; }

  function kpiTooltip(title, rows, colFn) {
    const rowsHtml = rows.length
      ? rows.map(r=>`<tr>${colFn(r)}</tr>`).join('')
      : '<tr><td colspan="3" class="empty-msg">없음</td></tr>';
    return `<div class="kpi-tooltip"><div class="tt-title">${title} (${rows.length}건)</div><table>${rowsHtml}</table></div>`;
  }

  const kpis = [
    { cls:'red',    num:d.issues_open.length,    lbl:'⚠️ 미해결 이슈',
      tip: kpiTooltip('⚠️ 미해결 이슈', d.issues_open, r=>`<td>${badge(r.severity,sev(r.severity))}</td><td style="font-weight:600">${esc(r.title)}</td><td style="color:#888">${esc(r.date)}</td>`) },

    { cls:'teal',   num:d.oncall_today.length,   lbl:'📱 오늘 On-call',

  const kpiHtml = kpis.map(k=>`
    <div class="stat-card ${k.cls}" ${k.style?`style="${k.style}"`:''}">

  const hvHtml = d.handover_today.length ? d.handover_today.map(r=>`

    </div>`).join('') : emptyMsg('등록된 인수인계가 없습니다.');

  // 이슈
  const issHtml = d.issues_today.length ? `<table><thead><tr><th>구분</th><th>심각도</th><th>제목</th><th>상태</th></tr></thead><tbody>${

  document.getElementById('content').innerHTML = `

    <div class="dash-2col">

    </div>`;
}

// 업무일지 작성

async function renderWrite(date) {
  const today = new Date().toISOString().slice(0,10);
  _writeDate = date || today;
  const d = await api('/api/write?date=' + _writeDate);
  if (!d.ok) return;

  const ws = d.wl_status;
  const wlStatus = ws?.status || null;
  const isAdmin = ME?.role === 'admin';
  const isRejectedToMe = ws?.status === '반려' && ws?.rejected_to === ME?.user;
  const canEdit = isAdmin || !wlStatus || isRejectedToMe;

  // 상태 배지
  let statusBadge = '';
  if (wlStatus === '제출') {
    statusBadge = `<span style="background:#e8f5e9;color:#2e7d32;border:1px solid #a5d6a7;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600">✅ 제출됨</span>`;
  } else if (wlStatus === '반려') {
    statusBadge = `<span style="background:#fdecea;color:#c62828;border:1px solid #ffcdd2;padding:6px 16px;border-radius:20px;font-size:13px;font-weight:600">⚠️ 반려됨 — 수정 후 다시 저장하세요</span>`;
  }

  function accSection(id, headCls, icon, title, rows, bodyHtml) {
    return `<div class="acc">
      <div class="acc-head ${headCls}" onclick="toggle(this)">
        ${icon} ${title} <span class="cnt">(${rows.length}건)</span>
        <span class="toggle">▲</span>
      </div>
      <div class="acc-body">${bodyHtml}</div>
    </div>`;
  }

  // ① 근무자
  const rosterRows = d.roster.map(r=>`
    <div class="entry-row" id="row-r${r.id}">

      ${canEdit?`<div class="btns">
        <button class="btn btn-sm btn-primary" onclick="editRow('r${r.id}')">수정</button>
        <button class="btn btn-sm btn-danger" onclick="delItem('/api/write/roster/delete/${r.id}')">삭제</button>

      </div>
      <div class="form-row"><div><label>비고</label><input name="note" value="${esc(r.note||'')}"></div></div>
      <div style="display:flex;gap:6px">
        <button class="btn btn-sm btn-primary" onclick="saveEdit('/api/write/roster/edit/${r.id}','r${r.id}',['shift','staff_name','role','note'])">저장</button>
        <button class="btn btn-sm btn-secondary" onclick="cancelEdit('r${r.id}')">취소</button>

  const rosterAdd = canEdit ? `<div class="add-form">

      <div><label>근무조</label><select name="shift"><option>오전</option><option>종일</option><option>야간</option></select></div>

// ── 작성 페이지 공통 헬퍼 ──
function editRow(id) {
  document.getElementById('row-' + id).style.display = 'none';
  document.getElementById('edit-' + id).style.display = 'block';
}
function cancelEdit(id) {
  document.getElementById('row-' + id).style.display = 'flex';
  document.getElementById('edit-' + id).style.display = 'none';
}

function getFields(container, fields) {
  const data = {};
  fields.forEach(f => {
    const el = container.querySelector(`[name="${f}"]`);
    data[f] = el ? el.value : '';
  });
  return data;
}

async function saveEdit(url, rowId, fields) {
  const container = document.getElementById('edit-' + rowId);
  const data = getFields(container, fields);
  const r = await api(url, data);
  if (r.ok) renderWrite(_writeDate);
  else alert(r.msg || '저장 실패');
}

async function addItem(url, btn, fields, extra) {
  const container = btn.closest('.add-form');
  const data = {...getFields(container, fields), ...extra};
  const r = await api(url, data);
  if (r.ok) renderWrite(_writeDate);
  else alert(r.msg || '추가 실패');
}

async function delItem(url) {
  if (!confirm('삭제하시겠습니까?')) return;
  const r = await api(url, {});
  if (r.ok) renderWrite(_writeDate);
  else alert(r.msg || '삭제 실패');
}

async function resetDate() {
  if (!confirm(_writeDate + ' 날짜의 모든 데이터를 초기화하시겠습니까?')) return;
  const r = await api('/api/write/reset/' + _writeDate, {});
  if (r.ok) renderWrite(_writeDate);
}

async function handleSave() {
  if (confirm('업무일지가 저장되었습니다.\n제출하시겠습니까?')) {
    const r = await api('/api/worklog/submit/' + _writeDate, {});
    if (r.ok) nav('worklog');
    else alert(r.msg || '제출 실패');
  }
}

async function renderWorklog() {
  const d = await api('/api/worklog');
  if (!d.ok) return;

  function dot(n) { return `<span class="dot ${n?'filled':'empty'}">${n||'-'}</span>`; }

  const rows = d.logs.map(log => `<tr>
    <td>${log.date}</td>
    <td>${log.rejected ? `<span class="badge-rejected">반려 (${esc(log.rejected_by)})</span>` : `<span class="badge-submitted">제출</span>`}</td>
    <td>${dot(log.roster)}</td>
    <td>${dot(log.vacation)}</td>
    <td>${dot(log.oncall)}</td>
    <td>${dot(log.overtime)}</td>
    <td>${dot(log.equipment)}</td>
    <td>${dot(log.handover)}</td>
    <td>${dot(log.issues)}</td>
    <td>
      ${ME?.role === 'admin' ? `
        <a href="#" onclick="nav('write',{date:'${log.date}'});return false" class="btn btn-sm btn-primary">수정</a>
        <a href="#" onclick="nav('print',{date:'${log.date}'});return false" class="btn btn-sm btn-secondary">인쇄</a>
        ${log.rejected
          ? `<a href="#" onclick="unrejectLog('${log.date}');return false" class="btn btn-sm btn-success">반려취소</a>`
          : `<button class="btn btn-sm btn-warning" onclick="openRejectModal('${log.date}')">반려</button>`}
      ` : log.rejected ? `
        <a href="#" onclick="nav('write',{date:'${log.date}'});return false" class="btn btn-sm btn-primary">수정</a>
        <a href="#" onclick="nav('print',{date:'${log.date}'});return false" class="btn btn-sm btn-secondary">인쇄</a>
      ` : `
        <a href="#" onclick="nav('print',{date:'${log.date}'});return false" class="btn btn-sm btn-secondary">인쇄</a>
      `}
    </td>
  </tr>`).join('') || `<tr><td colspan="10" style="padding:24px;color:#888">제출된 업무일지가 없습니다. <a href="#" onclick="nav('write');return false">작성하기</a></td></tr>`;

  // 반려 모달 사용자 목록
  document.getElementById('rejectUserSelect').innerHTML = d.users.map(u=>`<option value="${esc(u.username)}">${esc(u.name)} (${esc(u.username)})</option>`).join('');

  document.getElementById('content').innerHTML = `
  <div class="table-wrap">
    <div class="table-header">
      <h2>업무일지 리스트</h2>
      <a href="#" onclick="nav('write');return false" class="btn btn-primary">+ 오늘 작성</a>
    </div>
    <table class="log-table">
      <thead><tr>
        <th>날짜</th><th>상태</th><th>👥 근무자</th><th>🌴 휴가</th><th>📱 On-call</th>
        <th>⏰ 연장근무</th><th>🔧 장비이력</th><th>🔄 인수인계</th><th>⚠️ 이슈</th><th>관리</th>
      </tr></thead>
      <tbody>${rows}</tbody>
    </table>
  </div>`;
}

function openRejectModal(date) {
  _rejectDate = date;
  document.getElementById('rejectModalDate').textContent = date + ' 업무일지를 반려합니다.';
  document.getElementById('rejectModal').style.display = 'flex';
}
function closeRejectModal() { document.getElementById('rejectModal').style.display = 'none'; }
document.getElementById('rejectModal').addEventListener('click', e => { if (e.target === document.getElementById('rejectModal')) closeRejectModal(); });

async function confirmReject() {
  if (!confirm('선택한 사용자에게 반려하시겠습니까?')) return;
  const target = document.getElementById('rejectUserSelect').value;
  const r = await api('/api/worklog/reject/' + _rejectDate, {target_user: target});
  closeRejectModal();
  if (r.ok) renderWorklog();
}

async function unrejectLog(date) {
  if (!confirm('반려를 취소하시겠습니까?')) return;
  const r = await api('/api/worklog/unreject/' + date, {});
  if (r.ok) renderWorklog();
}

          <table class="approval-box">
            <thead><tr><th>파트장</th><th>팀장</th><th>진료과장</th></tr></thead>
            <tbody><tr><td></td><td></td><td></td></tr></tbody>
          </table>
        </td>
      </tr>
    </table>
    ${pSection('👥 근무자 현황',['근무조','성명','직종','비고'],d.roster, r=>`<td>${esc(r.shift)}</td><td>${esc(r.staff_name)}</td><td>${esc(r.role||'-')}</td><td>${esc(r.note||'-')}</td>`)}
    ${pSection('🌴 휴가 현황',['성명','구분','날짜'],d.vacation, r=>`<td>${esc(r.staff_name)}</td><td>${esc(r.vacation_type)}</td><td>${esc(r.start_date)}</td>`)}

      <div class="form-group"><label>이름</label><input id="u-name" placeholder="홍길동"></div>
      <div class="form-group"><label>비밀번호</label><input id="u-pw" type="password" placeholder="비밀번호"></div>
      <div class="form-group"><label>권한</label><select id="u-role"><option value="user">사용자</option><option value="admin">관리자</option></select></div>
    </div>
    <button class="btn btn-primary" onclick="addUser()">추가</button>
    <button class="btn btn-secondary" style="margin-left:8px" onclick="toggleAddForm()">취소</button>
  </div>`;

  window.toggleAddForm = toggleAddForm;
}

async function addUser() {
  const r = await api('/api/users/add', {
    username: document.getElementById('u-username').value,
    password: document.getElementById('u-pw').value,
    name: document.getElementById('u-name').value,
    role: document.getElementById('u-role').value,
  });
  if (r.ok) renderUsers();
  else alert(r.msg || '추가 실패');
}

async function deleteUser(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  const r = await api('/api/users/delete/' + id, {});
  if (r.ok) renderUsers();
}

// ── 세션 확인 후 시작 ──
(async function init() {
  document.getElementById('inp-pw').addEventListener('keydown', e => { if (e.key === 'Enter') doLogin(); });
  document.getElementById('inp-user').addEventListener('keydown', e => { if (e.key === 'Enter') document.getElementById('inp-pw').focus(); });
  const r = await api('/api/me');
  if (r.ok) {
    ME = r;
    document.getElementById('login-page').style.display = 'none';
    document.getElementById('app-page').style.display = '';
    document.getElementById('sf-name').textContent = r.name;
    document.getElementById('sf-role').textContent = r.role === 'admin' ? '관리자' : '사용자';
    document.querySelectorAll('.admin-only').forEach(el => el.style.display = r.role === 'admin' ? '' : 'none');
    nav('dashboard');
  } else if (!r.ok && r.msg && r.msg.includes('연결')) {
    const el = document.getElementById('login-alert');
    el.textContent = r.msg;
    el.style.display = '';
  }
})();
</script>
</body>
</html>
